apiVersion: v1
kind: ConfigMap
metadata:
  name: know-your-team-config
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: config
data:
  # Backend config
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  CORS_ORIGIN: "https://knowyourteam.yourdomain.com"

  # Frontend config
  VITE_API_URL: "https://knowyourteam.yourdomain.com"
  NGINX_WORKER_PROCESSES: "auto"
  NGINX_WORKER_CONNECTIONS: "1024"

  # App config
  APP_NAME: "Know Your Team"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: nginx
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /api/ {
            proxy_pass http://know-your-team-backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    }

# ─────────────────────────────────────────────────────────────────────────────
#  DEPLOYMENT — Backend (Node.js Express API)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: know-your-team-backend
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
    tier: backend
  annotations:
    deployment.kubernetes.io/revision: "1"
    # ArgoCD will auto-update this image tag via GitOps
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: know-your-team-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime rolling updates
  template:
    metadata:
      labels:
        app: know-your-team-backend
        app.kubernetes.io/name: know-your-team
        app.kubernetes.io/component: backend
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: know-your-team-sa
      imagePullSecrets:
        - name: ghcr-pull-secret
      terminationGracePeriodSeconds: 30

      # Security context at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      containers:
        - name: backend
          # ⚠️  Image tag is updated automatically by GitHub Actions CI/CD
          image: ghcr.io/ayanraaz12345/know-your-team-backend:sha-9bd5e65
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: know-your-team-config
            - secretRef:
                name: know-your-team-secrets
                optional: true

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          # Startup probe — give app time to start
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # 60s total startup time

          # Liveness probe — restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe — only route traffic when ready
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: know-your-team-backend

---
# ─────────────────────────────────────────────────────────────────────────────
#  DEPLOYMENT — Frontend (React + Nginx)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: know-your-team-frontend
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "1.0.0"
    tier: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: know-your-team-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: know-your-team-frontend
        app.kubernetes.io/name: know-your-team
        app.kubernetes.io/component: frontend
        tier: frontend
    spec:
      serviceAccountName: know-your-team-sa
      imagePullSecrets:
        - name: ghcr-pull-secret
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 101      # nginx user
        runAsGroup: 101
        fsGroup: 101

      containers:
        - name: frontend
          # ⚠️  Image tag is updated automatically by GitHub Actions CI/CD
          image: ghcr.io/ayanraaz12345/know-your-team-frontend:sha-9bd5e65
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          startupProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-pid
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-pid
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: know-your-team-frontend

---
# ─────────────────────────────────────────────────────────────────────────────
#  SERVICE ACCOUNT
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: know-your-team-sa
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
automountServiceAccountToken: false

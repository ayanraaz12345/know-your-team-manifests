# ─────────────────────────────────────────────────────────────────────────────
#  INGRESS — Know Your Team
#  Requires:
#    - nginx ingress controller:
#        helm install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx --create-namespace
#    - cert-manager (for TLS):
#        helm install cert-manager jetstack/cert-manager -n cert-manager --create-namespace --set installCRDs=true
#    - ClusterIssuer (letsencrypt-prod) configured
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: know-your-team-ingress
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: ingress
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: "nginx"

    # TLS — auto-issue Let's Encrypt certificate via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Redirect HTTP → HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"

    # CORS (handled by backend, but set headers at ingress too)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - knowyourteam.yourdomain.com     # 🔁 Replace with your domain
        - api.knowyourteam.yourdomain.com # 🔁 Replace with your API domain
      secretName: know-your-team-tls

  rules:
    # ── Frontend (main app) ────────────────────────────────────────
    - host: knowyourteam.yourdomain.com   # 🔁 Replace with your domain
      http:
        paths:
          # Route /api/* to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: know-your-team-backend
                port:
                  number: 5000
          # Route everything else to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: know-your-team-frontend
                port:
                  number: 80

    # ── Backend API subdomain (optional) ──────────────────────────
    - host: api.knowyourteam.yourdomain.com  # 🔁 Replace with your API domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: know-your-team-backend
                port:
                  number: 5000

---
# ─────────────────────────────────────────────────────────────────────────────
#  CLUSTER ISSUER — Let's Encrypt Production
#  Apply once per cluster (not per namespace)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: know-your-team
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@yourdomain.com        # 🔁 Replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

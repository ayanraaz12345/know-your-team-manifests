# ─────────────────────────────────────────────────────────────────────────────
#  SECRET MANIFEST — Know Your Team
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: know-your-team-secrets
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: secrets
type: Opaque
# Hum 'stringData' use kar rahe hain taaki plain text likh sakein aur error na aaye
stringData:
  DATABASE_URL: "placeholder-database-url"
  JWT_SECRET: "placeholder-jwt-secret"
  API_KEY: "placeholder-api-key"

---
# Container Registry pull secret
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: registry-auth
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJnaGNyLmlvIjp7InVzZXJuYW1lIjoiUExBQ0VIT0xERVIiLCJwYXNzd29yZCI6IlBMQUNFSE9MREVSIiwiYXV0aCI6IlBMQUNFSE9MREVSX0JBU0U2NCJ9fX0=

---
# TLS Certificate secret (FIXED: Valid Base64 placeholders)
apiVersion: v1
kind: Secret
metadata:
  name: know-your-team-tls
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: tls
  annotations:
    cert-manager.io/certificate-name: know-your-team-cert
type: kubernetes.io/tls
data:
  # 'placeholder' ka valid base64 encode kiya gaya hai taaki byte 11 error na aaye
  tls.crt: cGxhY2Vob2xkZXI=
  tls.key: cGxhY2Vob2xkZXI=

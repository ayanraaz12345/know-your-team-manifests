# ─────────────────────────────────────────────────────────────────────────────
#  SECRET MANIFEST — Know Your Team
#  ⚠️  DO NOT commit real secret values to Git.
#  Use one of these strategies:
#    1. Sealed Secrets (kubeseal) — encrypt before committing
#    2. External Secrets Operator — pull from AWS Secrets Manager / Vault
#    3. SOPS (Mozilla) — encrypt with age/GPG key
#
#  The values below are BASE64-ENCODED PLACEHOLDERS.
#  Replace with real sealed/encrypted values before applying.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: know-your-team-secrets
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: secrets
  annotations:
    # Uncomment if using External Secrets Operator
    # externalsecrets.io/backend: aws-secrets-manager
    # externalsecrets.io/key: prod/know-your-team
type: Opaque
data:
  # echo -n 'your-value' | base64
  # Replace these placeholders with real sealed values
  DATABASE_URL: cGxhY2Vob2xkZXI=        # placeholder
  JWT_SECRET: cGxhY2Vob2xkZXI=           # placeholder
  API_KEY: cGxhY2Vob2xkZXI=             # placeholder

---
# Container Registry pull secret
# Create with:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USERNAME \
#     --docker-password=YOUR_GITHUB_PAT \
#     --namespace=know-your-team \
#     --dry-run=client -o yaml | kubeseal -o yaml > secret.yml
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: registry-auth
type: kubernetes.io/dockerconfigjson
data:
  # Replace with real base64-encoded dockerconfigjson
  # {"auths":{"ghcr.io":{"username":"...","password":"...","auth":"..."}}}
  .dockerconfigjson: eyJhdXRocyI6eyJnaGNyLmlvIjp7InVzZXJuYW1lIjoiUExBQ0VIT0xERVIiLCJwYXNzd29yZCI6IlBMQUNFSE9MREVSIiwiYXV0aCI6IlBMQUNFSE9MREVSX0JBU0U2NCJ9fX0=

---
# TLS Certificate secret (for Ingress HTTPS)
# Create with cert-manager or:
#   kubectl create secret tls know-your-team-tls \
#     --cert=tls.crt --key=tls.key \
#     --namespace=know-your-team \
#     --dry-run=client -o yaml | kubeseal -o yaml >> secret.yml
apiVersion: v1
kind: Secret
metadata:
  name: know-your-team-tls
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: tls
  annotations:
    # Managed by cert-manager — remove if manually managing TLS
    cert-manager.io/certificate-name: know-your-team-cert
type: kubernetes.io/tls
data:
  tls.crt: PLACEHOLDER_BASE64_CERT==
  tls.key: PLACEHOLDER_BASE64_KEY==

# ─────────────────────────────────────────────────────────────────────────────
#  SERVICE — Backend (No changes)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: know-your-team-backend
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: backend
    tier: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
spec:
  type: ClusterIP
  selector:
    app: know-your-team-backend
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
  sessionAffinity: None

---
# ─────────────────────────────────────────────────────────────────────────────
#  SERVICE — Frontend (No changes)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: know-your-team-frontend
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: frontend
    tier: frontend
spec:
  type: ClusterIP
  selector:
    app: know-your-team-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  sessionAffinity: None

---
# ─────────────────────────────────────────────────────────────────────────────
#  SERVICE — LoadBalancer (FIXED FOR QUOTA ERROR)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: know-your-team-loadbalancer
  namespace: know-your-team
  labels:
    app.kubernetes.io/name: know-your-team
    app.kubernetes.io/component: loadbalancer
spec:
  # CHANGE: Yahan 'LoadBalancer' ki jagah 'ClusterIP' kiya hai. 
  # Reason: Error "exceeded quota: services.nodeports=0"
  type: ClusterIP 
  selector:
    app: know-your-team-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 80
